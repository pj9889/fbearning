<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ল্যান্ডিং পেজ কন্টেইনার */
        .container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* ব্যাকগ্রাউন্ড ইমেজ স্লাইডার (১ সেকেন্ড পর পর চেঞ্জ হবে) */
        .slider-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slider-bg img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }

        .slider-bg img.active {
            opacity: 0.5;
        }

        /* উপরের লোগো (ডান থেকে বাম পর্যন্ত বড়) */
        .logo-area {
            position: relative;
            z-index: 2;
            margin-top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-area img {
            width: 85%;
            max-width: 380px;
            height: auto;
            object-fit: contain;
        }

        /* স্টাইলিশ রিডাইরেক্ট বক্স (৩ সেকেন্ড পর আসবে) */
        .redirect-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 3;
            width: 85%;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 20px;
            border-radius: 20px;
            border: 2px solid #ff3366;
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.5);
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .redirect-box.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .redirect-box h2 {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* আকর্ষণীয় অ্যানিমেটেড কাউন্টডাউন নাম্বার */
        .countdown-number {
            font-size: 65px;
            font-weight: 800;
            color: #ff3366;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
            margin-top: 10px;
            display: inline-block;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ব্যাকগ্রাউন্ড ইমেজ স্লাইডার -->
        <div class="slider-bg">
            <img src="jk1.webp" class="active" alt="Pic 1">
            <img src="jk2.webp" alt="Pic 2">
            <img src="jk3.webp" alt="Pic 3">
            <img src="jk4.webp" alt="Pic 4">
        </div>

        <!-- টপ লোগো এরিয়া -->
        <div class="logo-area">
            <img src="jkz.png" alt="Logo">
        </div>

        <!-- আকর্ষণীয় পপআপ কন্টেইনার (বানান Jacklyn আপডেট করা হয়েছে) -->
        <div class="redirect-box" id="redirectBox">
            <h2>You are connecting with Jacklyn For Free Fuck</h2>
            <div class="countdown-number" id="countdown">5</div>
        </div>
    </div>

    <!-- রিডাইরেক্ট লিংক ব্যাকগ্রাউন্ডে প্রি-লোড করার জন্য -->
    <link rel="prefetch" href="https://paysale.g2afse.com/click?pid=125904&offer_id=10417&sub1=tgrm">

    <script>
        // ইমেজ স্লাইডার (১ সেকেন্ড পর পর অনবরত চেঞ্জ হবে)
        const images = document.querySelectorAll('.slider-bg img');
        let currentImgIndex = 0;

        setInterval(() => {
            images[currentImgIndex].classList.remove('active');
            currentImgIndex = (currentImgIndex + 1) % images.length;
            images[currentImgIndex].classList.add('active');
        }, 1000);

        // টাইমিং এবং কাউন্টডাউন লজিক
        const targetUrl = "https://paysale.g2afse.com/click?pid=125904&offer_id=10417&sub1=tgrm";
        const redirectBox = document.getElementById('redirectBox');
        const countdownDisplay = document.getElementById('countdown');
        
        let timeLeft = 5;

        // ৩ সেকেন্ড পর পপআপ শো এবং কাউন্টডাউন শুরু
        setTimeout(() => {
            redirectBox.classList.add('show');
            
            const counterInterval = setInterval(() => {
                timeLeft--;
                countdownDisplay.textContent = timeLeft;

                // ০ হওয়া মাত্রই সাথে সাথে রিডাইরেক্ট
                if (timeLeft <= 0) {
                    clearInterval(counterInterval);
                    window.location.href = targetUrl;
                }
            }, 1000);

        }, 3000);
    </script>
</body>
</html>
